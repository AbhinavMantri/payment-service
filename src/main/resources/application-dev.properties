security.jwt.secret=dev-secret-change-me
internal.api.shared-secret=dev-shared-secret-change-me
# Local PostgreSQL (dev)
spring.datasource.url=jdbc:postgresql://localhost:5432/payment_db?currentSchema=payment_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=payment_db

# Razorpay configuration (for dev environment)
payment.razorpay.base-url=${RAZORPAY_BASE_URL:https://api.razorpay.com}
payment.razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_change_me}
payment.razorpay.key-secret=${RAZORPAY_KEY_SECRET:change-me}
payment.razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:change-me}